<h1>{{ title() }}</h1>

<div class="toolbar">
  <input
    type="text"
    placeholder="Buscar…"
    [ngModel]="search()"
    (ngModelChange)="search.set($event)"
    style="max-width: 320px"
  />
</div>

<p *ngIf="loading()" class="muted">Carregando…</p>

<div *ngIf="!loading() && error()" class="card" style="color: var(--danger)">{{ error() }}</div>

<p *ngIf="!loading() && !error() && filtered().length === 0" class="muted">Nenhum registro encontrado.</p>

<table *ngIf="!loading() && !error() && filtered().length > 0">
  <thead>
    <tr>
      <th *ngFor="let col of columns()">{{ col.label }}</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let item of filtered()">
      <td *ngFor="let col of columns()">{{ cell(item, col.key) }}</td>
    </tr>
  </tbody>
</table>
