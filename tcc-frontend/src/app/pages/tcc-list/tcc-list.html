<h1>TCCs</h1>

<div class="toolbar">
  <input
    type="text"
    placeholder="Buscar por título ou resumo…"
    [(ngModel)]="search"
    (keyup.enter)="load()"
    style="max-width: 320px"
  />
  <button (click)="load()">Buscar</button>
  <a class="btn btn-primary" routerLink="/tccs/new">+ Novo TCC</a>
</div>

<p *ngIf="loading()" class="muted">Carregando…</p>

<div *ngIf="!loading() && error()" class="card" style="color: var(--danger)">{{ error() }}</div>

<p *ngIf="!loading() && !error() && tccs().length === 0" class="muted">Nenhum TCC encontrado.</p>

<table *ngIf="!loading() && !error() && tccs().length > 0">
  <thead>
    <tr>
      <th>Título</th>
      <th>Tipo</th>
      <th>Status</th>
      <th>Arquivo</th>
      <th></th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let tcc of tccs()">
      <td><a [routerLink]="['/tccs', tcc.id]">{{ tcc.titulo }}</a></td>
      <td>{{ tcc.tipo_display || tcc.tipo }}</td>
      <td>
        <select [ngModel]="tcc.status" (ngModelChange)="onStatusChange(tcc, $event)">
          <option *ngFor="let s of statusChoices" [value]="s.value">{{ s.label }}</option>
        </select>
      </td>
      <td>
        <a *ngIf="tcc.arquivo" [href]="arquivoUrl(tcc.id)" target="_blank" rel="noopener">PDF</a>
        <span *ngIf="!tcc.arquivo" class="muted">—</span>
      </td>
      <td class="actions">
        <a class="btn" [routerLink]="['/tccs', tcc.id, 'edit']">Editar</a>
        <button class="btn btn-danger" (click)="remove(tcc)">Excluir</button>
      </td>
    </tr>
  </tbody>
</table>
