services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tccdb
      POSTGRES_USER: tccuser
      POSTGRES_PASSWORD: tccpass
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tccuser -d tccdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./projeto-gestao-tccs
    environment:
      POSTGRES_DB: tccdb
      POSTGRES_USER: tccuser
      POSTGRES_PASSWORD: tccpass
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    ports:
      - "8000:8000"
    volumes:
      - media:/app/media
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./tcc-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  pgdata:
  media:
